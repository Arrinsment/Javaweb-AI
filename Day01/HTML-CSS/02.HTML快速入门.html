<!-- ctrl+/ 即可快速生成注释 -->
<!-- 要先 ctrl+s 保存后打开 -->
<!-- !号一键生成 -->
 <!-- DOCTYPE: document type 文档类型的简称-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML快速入门</title>
</head>
<body>
 <!-- 直接使用h1 不用<> 即可马上生成一个开始和结束标签 -->
 <h1>HTML快速入门</h1>
 <img src="1.png" >
<!-- 可以自己写注释然后让ai给我们生成代码 -->
<!-- 给我生成一个一级标题 内容是:在下江婉晚-->

<h1>在下江婉晚</h1>
</body>
</html>
