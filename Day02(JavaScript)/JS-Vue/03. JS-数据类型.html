<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS-数据类型</title>
</head>
<body>
  
  <script>
    //1. 数据类型
    alert(typeof 10);//number 
    alert(typeof 1.5);//number  
    
    alert(typeof true);//boolean 
    alert(typeof false);//boolean 

    alert(typeof "Hello");//String
    alert(typeof 'JS'); //String
    alert(typeof `JavaScript`);//String 

    alert(typeof null); //object

    let a ;
    alert(typeof a); //undefined


    //2.模板字符串---简化字符串进行拼接
    let name="tom";
    let age=18;
    console.log("I am"+name+"who is "+age);//I amtomwho is 18

    console.log(`I am${name}who is${age}`);//I amtomwho is 18  S要用反引号引用起来才可以用${}, 
    
  </script>
</body>
</html>
