<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex布局</title>
  <style>
    #container{
      background-color: #f5f5f5;
      width: 500px;
      height: 300px;
      display:flex;/* 弹性布局 默认是横向row布局的*/

       flex-direction: row;/*默认row水平方向.设置为主轴(横着)方向 */ 
       
       /*flex justify-content; */
      justify-content: center;        /* center: 在主轴居中对齐 */
      justify-content: flex-start;    /* flex-start: 从头开始排列 */
      justify-content: flex-end;      /* flex-end: 从尾部开始排列 */
      justify-content: space-around ; /* space-around: 平分剩余空间 */
      justify-content: space-between; /* space-between: 先两边贴边，再平分剩余空间 */

    }

    .item{
      width: 100px;
      height: 50px;
      background-color: rgb(184,246,184);
      border: 1px solid rgb(141,130,136);
    } 
     </style>

</head>
<body>
  <div id="container">
  <div class="item"></div>
  <div class="item"></div>
  <div class="item"></div>
</div>

</body>
</html>
